<!doctype html>
<!-- App-icon master. Rendered headless at 1024×1024 with a transparent canvas, then downscaled
     into AppIcon.appiconset — keep in docs/ so the icon can be regenerated/tweaked later. -->
<html><head><meta charset="utf-8"><style>html,body{margin:0;background:transparent}</style></head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- deep ink field with a faint gold illumination from the top -->
    <radialGradient id="ink" cx="50%" cy="18%" r="95%">
      <stop offset="0%"  stop-color="#1b2231"/>
      <stop offset="45%" stop-color="#10141f"/>
      <stop offset="100%" stop-color="#080b12"/>
    </radialGradient>
    <!-- leaf gold -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#f6dfa0"/>
      <stop offset="45%" stop-color="#dcb35f"/>
      <stop offset="100%" stop-color="#a8813a"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f6dfa0"/>
      <stop offset="100%" stop-color="#d3a94f"/>
    </linearGradient>
    <filter id="plateShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="starShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- plate: Apple macOS icon grid (824×824, r≈186) -->
  <g filter="url(#plateShadow)">
    <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#ink)"/>
    <!-- hairline gold rim -->
    <rect x="106" y="106" width="812" height="812" rx="180" fill="none"
          stroke="#d9b45c" stroke-opacity="0.28" stroke-width="3"/>
  </g>

  <!-- soft gold halo behind the medallion -->
  <circle cx="512" cy="512" r="330" fill="#d9b45c" opacity="0.10"/>
  <circle cx="512" cy="512" r="250" fill="#d9b45c" opacity="0.10"/>

  <!-- khatam: true two-squares-overlaid 8-point star (outer R=300, inner r=230) -->
  <g filter="url(#starShadow)">
    <polygon fill="url(#gold)" points="
      512,212 600,299.5 724.1,299.9 724.5,424 812,512 724.5,600 724.1,724.1 600,724.5
      512,812 424,724.5 299.9,724.1 299.5,600 212,512 299.5,424 299.9,299.9 424,299.5"/>
    <!-- inset ink detail line — the layered edge of a manuscript stamp (same star, scaled 0.87) -->
    <polygon fill="none" stroke="#0c1119" stroke-opacity="0.38" stroke-width="6" stroke-linejoin="round" points="
      512,251 588.6,327.1 696.5,327.5 696.9,435.4 773,512 696.9,588.6 696.5,696.5 588.6,696.9
      512,773 435.4,696.9 327.5,696.5 327.1,588.6 251,512 327.1,435.4 327.5,327.5 435.4,327.1"/>
    <!-- center field -->
    <circle cx="512" cy="512" r="180" fill="#0c1119"/>
    <circle cx="512" cy="512" r="160" fill="none" stroke="#d9b45c" stroke-opacity="0.55" stroke-width="4"/>
  </g>

  <!-- the recitation: 4-bar equalizer in gold -->
  <g fill="url(#goldBar)">
    <rect x="404" y="458" width="36" height="108" rx="18"/>
    <rect x="464" y="404" width="36" height="216" rx="18"/>
    <rect x="524" y="431" width="36" height="162" rx="18"/>
    <rect x="584" y="452" width="36" height="120" rx="18"/>
  </g>
</svg>
</body></html>
