name: Qurani
options:
  bundleIdPrefix: net.widev.qurani
  deploymentTarget: { macOS: "26.0" }
packages:
  QuraniKit: { path: . }
  KeyboardShortcuts: { url: https://github.com/sindresorhus/KeyboardShortcuts, from: "2.3.0" }
targets:
  Qurani:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: QuraniKit
        product: QuraniKit
      - package: KeyboardShortcuts
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Qurani.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: net.widev.qurani
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        # Dev/source builds. Releases are stamped from the git tag by CI (see release.yml), so
        # keep this at (or above) the next planned tag — a source build that lags the published
        # releases would offer to "update" itself to an older binary.
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
